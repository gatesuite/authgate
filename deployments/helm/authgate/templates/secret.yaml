{{/*
  AuthGate requires an externally managed K8s Secret for all sensitive values.
  The secret must be created before installing the chart.

  Required keys in the secret:
    - SECRET_KEY        (app signing key)
    - DATABASE_URL      (PostgreSQL connection string)

  Per enabled provider, include:
    - <PROVIDER>_CLIENT_ID
    - <PROVIDER>_CLIENT_SECRET

  Example:
    kubectl create secret generic authgate-secrets \
      --from-literal=SECRET_KEY="$(openssl rand -base64 32)" \
      --from-literal=DATABASE_URL="postgresql+asyncpg://user:pass@host:5432/authgate" \
      --from-literal=GITHUB_CLIENT_ID="..." \
      --from-literal=GITHUB_CLIENT_SECRET="..."

  Then set: existingSecret: authgate-secrets
*/}}
{{- if not .Values.existingSecret }}
{{- fail "\n\nexistingSecret is required. Create a K8s Secret with your credentials first:\n\n  kubectl create secret generic authgate-secrets \\\n    --from-literal=SECRET_KEY=\"$(openssl rand -base64 32)\" \\\n    --from-literal=DATABASE_URL=\"postgresql+asyncpg://user:pass@host:5432/authgate\" \\\n    --from-literal=GITHUB_CLIENT_ID=\"...\" \\\n    --from-literal=GITHUB_CLIENT_SECRET=\"...\"\n\nThen set: --set existingSecret=authgate-secrets\n" }}
{{- end }}
