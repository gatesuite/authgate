services:
  authgate:
    image: ghcr.io/gatesuite/authgate:3.0.0 # x-release-please-version
    build:
      context: ../..
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:8000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://authgate:authgate@postgres:5432/authgate
      AUTHGATE_HOT_RELOAD: "0"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - authgate-keys:/app/keys
      - ../../authgate.yaml:/app/authgate.yaml:ro
    restart: unless-stopped

  admin:
    image: ghcr.io/gatesuite/authgate-admin:latest
    build:
      context: ../..
      dockerfile: admin/Dockerfile
      target: production
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://authgate:authgate@postgres:5432/authgate
      # ADMIN_USERNAME defaults to "admin" if unset
      # ADMIN_PASSWORD must be set in .env — empty value disables login
      # ADMIN_SECRET_KEY is optional; falls back to SECRET_KEY if unset
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authgate
      POSTGRES_PASSWORD: authgate
      POSTGRES_DB: authgate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authgate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  authgate-keys:
