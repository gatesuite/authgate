name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: E2E (pytest + real Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: authgate
          POSTGRES_PASSWORD: authgate
          POSTGRES_DB: authgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt -r admin/requirements.txt

      - name: Run E2E tests
        run: pytest tests/ -v
        env:
          AUTHGATE_CONFIG: tests/authgate.test.yaml
          DATABASE_URL: postgresql+asyncpg://authgate:authgate@localhost:5432/authgate_test
          AUTHGATE_TEST: "1"
          SECRET_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
